# ==========================================================================
# Streamlit Community Cloud Secrets Template
#   - Paste the same root-level keys into your app's Secrets panel.
#   - Root-level secrets become environment variables, which matches how
#     LISBOA reads credentials via os.getenv(...).
#   - Never commit the real .streamlit/secrets.toml file.
# ==========================================================================

# --------------------------------------------------------------------------
# Optional Hugging Face Hub token for embedding/model downloads
# --------------------------------------------------------------------------
# Fine-grained read-only token. Useful for faster/more reliable downloads of
# public embedding models such as BAAI/bge-m3 in hosted deployments.
HF_TOKEN = "your_huggingface_read_token_here"

# --------------------------------------------------------------------------
# Required for the current production mode (Azure OpenAI locked provider)
# --------------------------------------------------------------------------
AZURE_OPENAI_API_KEY = "your_azure_key_here"
AZURE_OPENAI_ENDPOINT = "https://your-resource-name.openai.azure.com/"
AZURE_OPENAI_DEPLOYMENT_NAME = "your_deployment_name_here"

# --------------------------------------------------------------------------
# Optional alternate provider
# --------------------------------------------------------------------------
OPENAI_API_KEY = "your_openai_api_key_here"
OPENAI_MODEL_NAME = "gpt-5.4-mini"

# --------------------------------------------------------------------------
# Optional Metro de Lisboa official realtime API
# --------------------------------------------------------------------------
METRO_CONSUMER_KEY = "your_metro_consumer_key_here"
METRO_CONSUMER_SECRET = "your_metro_consumer_secret_here"

# --------------------------------------------------------------------------
# Optional LangSmith tracing
# --------------------------------------------------------------------------
LANGSMITH_TRACING = "true"
LANGSMITH_API_KEY = "your_langsmith_api_key_here"
LANGSMITH_PROJECT = "my-thesis-project"
LANGSMITH_ENDPOINT = "https://eu.api.smith.langchain.com"
# LANGSMITH_WORKSPACE_ID = "your_langsmith_workspace_id_here"
# LANGSMITH_SYNC_FLUSH = "false"

# --------------------------------------------------------------------------
# Optional Tavily web search
# --------------------------------------------------------------------------
TAVILY_API_KEY = "your_tavily_api_key_here"

# --------------------------------------------------------------------------
# Optional runtime logging for hosted debugging
# --------------------------------------------------------------------------
# Use "true" only while debugging; set back to "false" for user-study runs if
# the logs become too noisy.
SHOW_MARKDOWN_RESPONSE_IN_TERMINAL = "false"
SHOW_DETAILED_EXECUTION_LOGS = "false"

# ========================================================================== 
# Vector DB Release Asset
# ========================================================================== 
# Used by hosted deployments when data/vector_db is downloaded from GitHub Releases.
VECTOR_DB_RELEASE_ENABLED = "true"
VECTOR_DB_RELEASE_REPO = "github_user/repository_name_here"
VECTOR_DB_RELEASE_TAG = "vector-db-latest"
VECTOR_DB_RELEASE_ASSET = "vector_db.zip"
VECTOR_DB_RELEASE_TOKEN = "your_github_read_token_here"
# VECTOR_DB_RELEASE_FORCE_DOWNLOAD = "false"
# VECTOR_DB_RELEASE_TIMEOUT_SECONDS = "120"

# ==========================================================================
# Transport Runtime Release Assets
# ==========================================================================
# Last-known-good fallback for CP and Carris Urban SQLite files when a hosted
# deployment starts without committed transport DB files and the live GTFS
# download is temporarily unavailable. If TRANSPORT_DATA_RELEASE_TOKEN is not
# set, LISBOA reuses VECTOR_DB_RELEASE_TOKEN.
TRANSPORT_DATA_RELEASE_REPO = "github_user/repository_name_here"
TRANSPORT_DATA_RELEASE_TAG = "transport-data-latest"
# TRANSPORT_DATA_RELEASE_TOKEN = "your_github_read_token_here"
# TRANSPORT_DATA_RELEASE_MAX_BYTES = "1800000000"
CARRIS_RUNTIME_RELEASE_ENABLED = "true"
CARRIS_RUNTIME_RELEASE_ASSET = "carris_runtime.zip"
CP_RUNTIME_RELEASE_ENABLED = "true"
CP_RUNTIME_RELEASE_ASSET = "cp_runtime.zip"

# Optional writable generated-data location in hosted runtimes.
# LISBOA_RUNTIME_DATA_DIR = "/tmp/lisboa_runtime"
# VECTOR_DB_DIR = "/tmp/lisboa_runtime/vector_db"
#
# Local smoke-test acceleration only. Ignored automatically in Hugging Face
# Spaces so hosted deployments keep running remote freshness checks.
# LISBOA_REUSE_LOCAL_TRANSPORT_DATA = "false"

# --------------------------------------------------------------------------
# Optional Streamlit cache policy
# --------------------------------------------------------------------------
# Leave unset for one startup preload per server process. Set only if the app
# must refresh release-backed resources without a redeploy/restart.
# STREAMLIT_RESOURCE_CACHE_TTL_SECONDS = "86400"

# --------------------------------------------------------------------------
# Optional Hugging Face Docker startup preload
# --------------------------------------------------------------------------
# Used only by the Docker Space entrypoint. Keep REQUIRED=false unless you want
# the container to fail instead of serving the app when startup resources are
# temporarily unavailable.
# LISBOA_STARTUP_PRELOAD_ENABLED = "true"
# LISBOA_STARTUP_PRELOAD_REQUIRED = "false"
# LISBOA_STARTUP_PRELOAD_LANGUAGE = "pt"
