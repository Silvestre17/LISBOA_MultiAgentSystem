[theme]
primaryColor = "#ff4011"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#fafafa"
textColor = "#18181b"
font = "sans serif"

[client]
showErrorDetails = "none"

[server]
enableCORS = true
enableXsrfProtection = true
# Use "none" to avoid PyTorch compatibility issues with file watcher
fileWatcherType = "none"
