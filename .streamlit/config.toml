[theme]
primaryColor = "#ff4011"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#fafafa"
textColor = "#18181b"
font = "sans serif"

[client]
showErrorDetails = "none"

[server]
enableCORS = true
enableXsrfProtection = true
# Keep file watching active so GitHub updates trigger reruns on Community Cloud.
# The PyTorch watcher workaround is handled in app.py.
fileWatcherType = "auto"
