name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "app.py"
      - "config.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".streamlit/config.toml"
      - "scripts/hf_space_entrypoint.py"
      - "agent/**"
      - "tools/**"
      - "img/**"
      - "data/pricing/**"
      - "README.md"

  workflow_run:
    workflows: ["Sync Vector Database", "Sync Transport Runtime Data"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Prepare Hugging Face deploy bundle
        run: |
          set -euo pipefail

          rm -rf hf_space_build
          mkdir -p hf_space_build/.streamlit
          mkdir -p hf_space_build/scripts
          mkdir -p hf_space_build/data/pricing
          mkdir -p hf_space_build/data
          mkdir -p hf_space_build/img
          mkdir -p hf_space_build/data_collection/webscraping

          cp Dockerfile hf_space_build/
          cp .dockerignore hf_space_build/
          cp app.py hf_space_build/
          cp config.py hf_space_build/
          cp requirements.txt hf_space_build/
          cp pyproject.toml hf_space_build/
          cp LICENSE hf_space_build/
          cp scripts/hf_space_entrypoint.py hf_space_build/scripts/
          cp .streamlit/config.toml hf_space_build/.streamlit/config.toml

          rsync -a agent hf_space_build/
          rsync -a tools hf_space_build/
          cp img/BannerLSIBOA_21-9_optimized.webp hf_space_build/img/
          cp img/Logo_1-1_WithoutBG_optimized.webp hf_space_build/img/
          cp img/LISBOA_Framework.svg hf_space_build/img/
          cp img/t.png hf_space_build/img/
          rsync -a data/pricing/ hf_space_build/data/pricing/
          rsync -a data_collection/webscraping/ hf_space_build/data_collection/webscraping/

          cat > hf_space_build/data/vector_db_release.json <<EOF
          {
            "release_tag": "vector-db-latest",
            "release_asset": "vector_db.zip",
            "source_workflow": "${{ github.event.workflow_run.id || github.run_id }}",
            "deploy_run_id": "${{ github.run_id }}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          cat > hf_space_build/data/transport_runtime_release.json <<EOF
          {
            "release_tag": "transport-data-latest",
            "assets": ["carris_runtime.zip", "cp_runtime.zip"],
            "source_workflow": "${{ github.event.workflow_run.id || github.run_id }}",
            "deploy_run_id": "${{ github.run_id }}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          cat > hf_space_build/README.md <<'EOF'
          ---
          title: LISBOA
          emoji: 🗺️
          colorFrom: red
          colorTo: yellow
          sdk: docker
          python_version: 3.12.13
          app_port: 8501
          header: default
          fullWidth: true
          disable_embedding: false
          pinned: true
          thumbnail: https://huggingface.co/spaces/AndreSilvestre17/lisboa/resolve/main/img/BannerLSIBOA_21-9_optimized.webp
          startup_duration_timeout: 1h
          suggested_hardware: cpu-basic
          license: mit
          short_description: Lisbon AI Assistant for Tourism and Urban Mobility
          tags:
            - Streamlit
            - Docker
            - Multi-Agent Systems
            - Tourism
            - Urban Mobility
            - Lisbon
            - Academic Research
          ---

          # LISBOA | Lisbon AI Urban Assistant

          LISBOA is a non-commercial Master's thesis prototype developed at NOVA IMS. It explores a multi-agent AI approach for Lisbon tourism and urban mobility assistance, combining LLM orchestration with grounded data sources such as IPMA weather, Metro de Lisboa, Carris, Carris Metropolitana, CP, VisitLisboa, Lisboa Aberta, and curated local knowledge.

          ## Purpose

          This Space hosts the user-facing LISBOA prototype for academic demonstration and user-study evaluation. It allows participants to interact with the system through a public web interface while the implementation continues to evolve during the thesis period.

          ## Core Capabilities

          - Weather forecasts and warnings for Lisbon using IPMA data.
          - Transport status and mobility support across Lisbon-area operators.
          - Tourism and local-information answers grounded in curated Lisbon sources.
          - Itinerary-style assistance when the user asks for planning.
          - Portuguese and English interaction.

          ## Research Context

          - Project: LISBOA: Lisbon Itinerary System Based On AI
          - Scope: Master's Thesis Prototype, Non-Commercial Academic Use
          - Institution: NOVA IMS, Universidade NOVA de Lisboa

          ## Data and Runtime Notes

          The prototype depends on external public APIs and release-backed runtime datasets. Availability and freshness can vary when upstream services are temporarily unavailable.
          EOF

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub client
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --upgrade "huggingface_hub>=1.1,<2"

      - name: Upload deploy bundle to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: AndreSilvestre17/lisboa
          HF_REPO_TYPE: space
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN secret is not configured"
            exit 1
          fi

          if [ ! -d hf_space_build ]; then
            echo "::error::Deploy bundle directory 'hf_space_build' does not exist"
            exit 1
          fi

          FILE_COUNT=$(find hf_space_build -type f ! -path '*/.git/*' ! -path '*/.github/*' | wc -l | tr -d ' ')
          if [ "${FILE_COUNT}" -eq 0 ]; then
            echo "::error::Deploy bundle has no files to upload"
            exit 1
          fi

          echo "Uploading ${FILE_COUNT} files to https://huggingface.co/spaces/${HF_REPO_ID}"

          python <<'PY'
          import os
          import time

          from huggingface_hub import HfApi
          from huggingface_hub.utils import HfHubHTTPError


          def main() -> None:
              repo_id = os.environ["HF_REPO_ID"]
              repo_type = os.environ["HF_REPO_TYPE"]
              run_id = os.environ.get("GITHUB_RUN_ID", "local")
              api = HfApi(token=os.environ["HF_TOKEN"])

              max_attempts = 4
              for attempt in range(1, max_attempts + 1):
                  try:
                      # Idempotent bootstrap: ensures the Space exists (and keeps
                      # its sdk/visibility on first creation) without failing when
                      # it is already present. No-op for an existing repository.
                      api.create_repo(
                          repo_id=repo_id,
                          repo_type=repo_type,
                          space_sdk="docker",
                          private=True,
                          exist_ok=True,
                      )
                      commit_info = api.upload_folder(
                          repo_id=repo_id,
                          repo_type=repo_type,
                          folder_path="hf_space_build",
                          path_in_repo=".",
                          ignore_patterns=[".git*", ".github*"],
                          delete_patterns="*",
                          commit_message=f"Deploy LISBOA Space from GitHub run {run_id}",
                      )
                      print(f"Upload completed: {commit_info.commit_url}")
                      print(f"View at: https://huggingface.co/spaces/{repo_id}")
                      return
                  except HfHubHTTPError as exc:
                      status_code = getattr(exc.response, "status_code", None)
                      if status_code in (429, 500, 502, 503, 504) and attempt < max_attempts:
                          delay_seconds = 30 * attempt
                          reason = (
                              "429 Too Many Requests"
                              if status_code == 429
                              else f"HTTP {status_code}"
                          )
                          print(
                              f"Hugging Face returned {reason}; "
                              f"retrying in {delay_seconds}s "
                              f"(attempt {attempt}/{max_attempts})."
                          )
                          time.sleep(delay_seconds)
                          continue
                      raise


          if __name__ == "__main__":
              main()
          PY
