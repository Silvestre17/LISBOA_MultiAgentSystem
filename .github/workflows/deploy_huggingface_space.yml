name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "app.py"
      - "config.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".streamlit/config.toml"
      - "scripts/hf_space_entrypoint.py"
      - "agent/**"
      - "tools/**"
      - "img/**"
      - "data/pricing/**"
      - "README.md"

  workflow_run:
    workflows: ["Sync Vector Database", "Sync Transport Runtime Data"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Prepare Hugging Face deploy bundle
        run: |
          set -euo pipefail

          rm -rf hf_space_build
          mkdir -p hf_space_build/.streamlit
          mkdir -p hf_space_build/scripts
          mkdir -p hf_space_build/data/pricing
          mkdir -p hf_space_build/data
          mkdir -p hf_space_build/img
          mkdir -p hf_space_build/data_collection/webscraping

          cp Dockerfile hf_space_build/
          cp .dockerignore hf_space_build/
          cp app.py hf_space_build/
          cp config.py hf_space_build/
          cp requirements.txt hf_space_build/
          cp pyproject.toml hf_space_build/
          cp LICENSE hf_space_build/
          cp scripts/hf_space_entrypoint.py hf_space_build/scripts/
          cp .streamlit/config.toml hf_space_build/.streamlit/config.toml

          rsync -a agent hf_space_build/
          rsync -a tools hf_space_build/
          cp img/BannerLSIBOA_21-9_optimized.webp hf_space_build/img/
          cp img/Logo_1-1_WithoutBG_optimized.webp hf_space_build/img/
          cp img/LISBOA_Framework.svg hf_space_build/img/
          cp img/t.png hf_space_build/img/
          rsync -a data/pricing/ hf_space_build/data/pricing/
          rsync -a data_collection/webscraping/ hf_space_build/data_collection/webscraping/

          cat > hf_space_build/data/vector_db_release.json <<EOF
          {
            "release_tag": "vector-db-latest",
            "release_asset": "vector_db.zip",
            "source_workflow": "${{ github.event.workflow_run.id || github.run_id }}",
            "deploy_run_id": "${{ github.run_id }}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          cat > hf_space_build/data/transport_runtime_release.json <<EOF
          {
            "release_tag": "transport-data-latest",
            "assets": ["carris_runtime.zip", "cp_runtime.zip"],
            "source_workflow": "${{ github.event.workflow_run.id || github.run_id }}",
            "deploy_run_id": "${{ github.run_id }}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          cat > hf_space_build/README.md <<'EOF'
          ---
          title: LISBOA
          sdk: docker
          app_port: 8501
          license: mit
          ---

          # LISBOA

          Private Hugging Face Space deployment for the LISBOA thesis prototype.
          EOF

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: AndreSilvestre17/lisboa
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          private: true
          subdirectory: hf_space_build
