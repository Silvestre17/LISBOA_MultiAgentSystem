# ==========================================================================
# Master Thesis - Automated Data Pipeline for VisitLisbon.pt (GitHub Actions)
#   - André Filipe Gomes Silvestre, 20240502
#
# GitHub Actions Workflow to automate data scraping and updating of JSON files
#
# Strategy:
#   1. Scrape Events data daily
#   2. Scrape Places data weekly (only on Mondays)
#   3. Commit and push changes if any data has changed
#
# Runtime (estimated):
#   - Events Scraper: ~8 minutes
#   - Places Scraper: ~60 minutes
# ==========================================================================

name: Update Lisbon Data

concurrency:
  group: update-lisbon-data-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Daily at 04:00 UTC (GitHub Actions cron schedules always run in UTC)
    # - Events: Every day
    # - Places: Only on Mondays (controlled by if logic below)
    - cron: "0 4 * * *"

  # Allows manual run via GitHub "Run workflow" button
  workflow_dispatch:
    inputs:
      scrape_target:
        description: "Choose which VisitLisboa scraper to run manually"
        required: true
        default: both
        type: choice
        options:
          - events
          - places
          - both

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-webscraping-${{ hashFiles('requirements_github_action_webscraping.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-webscraping-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_github_action_webscraping.txt ]; then pip install -r requirements_github_action_webscraping.txt; fi

      - name: Resolve Manual Selection
        id: manual_selection
        run: |
          TARGET="${{ github.event.inputs.scrape_target || 'both' }}"
          echo "scrape_target=$TARGET" >> $GITHUB_OUTPUT
          echo "🎛️ Manual selection: $TARGET"

      # 1. Run Events Script (Daily, or manually when requested)
      - name: Run Events Scraper
        if: github.event_name != 'workflow_dispatch' || steps.manual_selection.outputs.scrape_target == 'events' || steps.manual_selection.outputs.scrape_target == 'both'
        run: |
          echo "Running Events Scraper..."
          python data_collection/webscraping/visitlisbon_events.py

      # 2. Run Places Script (Only on Mondays automatically, or manually when requested)
      - name: Check if Monday
        id: check_day
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          echo "day_of_week=$DAY_OF_WEEK" >> $GITHUB_OUTPUT
          if [ "$DAY_OF_WEEK" -eq 1 ]; then
            echo "📅 Today is Monday - Places will be scraped"
          else
            echo "📅 Today is not Monday (day $DAY_OF_WEEK) - Places scraper will be skipped"
          fi

      - name: Run Places Scraper
        if: steps.check_day.outputs.day_of_week == '1' || (github.event_name == 'workflow_dispatch' && (steps.manual_selection.outputs.scrape_target == 'places' || steps.manual_selection.outputs.scrape_target == 'both'))
        run: |
          echo "Running Places Scraper..."
          python data_collection/webscraping/visitlisbon_places.py

      # 3. Commit and Push changes
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add only changed JSON files
          git add data_collection/webscraping/*.json

          # Check for changes before committing
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data Auto-Update: $(date +'%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
