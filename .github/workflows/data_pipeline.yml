name: Update Lisbon Data

on:
  schedule:
    # Eventos: Todos os dias às 04:00 AM UTC
    - cron: '0 4 * * *'
  # Places: Todas as Segundas às 03:00 AM UTC (Separado por lógica if abaixo)
  
  # Permite correr manualmente no botão "Run workflow" do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 1. Correr Script de Eventos (Diário)
      - name: Run Events Scraper
        run: |
          echo "Running Events Scraper..."
          python data_collection/webscraping/visitlisbon_events.py

      # 2. Correr Script de Places (Apenas às Segundas ou Manualmente)
      - name: Run Places Scraper
        if: github.event.schedule == '0 4 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Running Places Scraper..."
          python data_collection/webscraping/visitlisbon_places.py

      # 3. Commit e Push das alterações
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona apenas os ficheiros JSON alterados
          git add data_collection/webscraping/*.json
          
          # Verifica se há alterações antes de fazer commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data Auto-Update: $(date +'%Y-%m-%d')"
            git push
          fi