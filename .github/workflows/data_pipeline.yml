name: Update Lisbon Data

on:
  schedule:
    # Daily at 04:00 AM UTC
    # - Events: Every day
    # - Places: Only on Tuesdays (controlled by if logic below)
    - cron: '0 4 * * *'
  
  # Allows manual run via GitHub "Run workflow" button
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-webscraping-${{ hashFiles('requirements_github_action_webscraping.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-webscraping-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_github_action_webscraping.txt ]; then pip install -r requirements_github_action_webscraping.txt; fi

      # 1. Run Events Script (Daily)
      - name: Run Events Scraper
        run: |
          echo "Running Events Scraper..."
          python data_collection/webscraping/visitlisbon_events.py

      # 2. Run Places Script (Only on Tuesdays or Manually)
      - name: Check if Tuesday
        id: check_day
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          echo "day_of_week=$DAY_OF_WEEK" >> $GITHUB_OUTPUT
          if [ "$DAY_OF_WEEK" -eq 2 ]; then
            echo "📅 Today is Tuesday - Places will be scraped"
          else
            echo "📅 Today is not Tuesday (day $DAY_OF_WEEK) - Places scraper will be skipped"
          fi

      - name: Run Places Scraper
        if: steps.check_day.outputs.day_of_week == '2' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Running Places Scraper..."
          python data_collection/webscraping/visitlisbon_places.py

      # 3. Commit and Push changes
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only changed JSON files
          git add data_collection/webscraping/*.json
          
          # Check for changes before committing
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data Auto-Update: $(date +'%Y-%m-%d')"
            git push
          fi