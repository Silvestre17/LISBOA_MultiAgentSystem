# ==========================================================================
# Master Thesis - Vector Store Sync Workflow (GitHub Actions)
#   - André Filipe Gomes Silvestre, 20240502
#
# Automatically syncs the vector database when JSON data files change.
# This workflow triggers after the data pipeline completes.
#
# Strategy:
#   1. Uses CPU-only inference (no GPU available in GitHub Actions)
#   2. Caches pip packages and HuggingFace models to reduce runtime
#   3. Processes documents in batches (200 docs per run = ~15-20 min)
#   4. Multiple workflow runs handle large updates incrementally
#   5. Commits the updated vector_db to the repository
#   6. Handles SIGTERM (exit code 143) gracefully for runner timeouts
#
# Cache sizes (approximate):
#   - pip packages: ~350MB
#   - HuggingFace model (bge-m3): ~2.5GB
#   - Total: ~2.9GB (within GitHub Pro's 10GB limit)
#
# Runtime note:
#   - Sync time varies with the number of changed documents and CPU-only embedding work.
#   - Large resumptions can span multiple committed iterations and multiple daily runs.
#
# GitHub Actions Limits (GitHub-hosted standard runners, docs checked 2026-03):
#   - Max runtime per job: 6 hours
#   - Max concurrent jobs: 20 (Free) / 40 (Pro)
#   - Included artifact storage: 500MB (Free) / 1GB (Pro)
#   - Included minutes: 2000/month (Free) / 3000/month (Pro)
#   - Default cache storage allowance: 10GB per repository
# ==========================================================================

name: Sync Vector Database

concurrency:
  group: sync-vector-db-${{ github.ref }}
  cancel-in-progress: false

on:
  # Trigger after data pipeline completes
  workflow_run:
    workflows: ["Update Lisbon Data"]
    types:
      - completed

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      rebuild_events:
        description: "Force rebuild events collection"
        required: false
        default: false
        type: boolean
      rebuild_places:
        description: "Force rebuild places collection"
        required: false
        default: false
        type: boolean
      max_docs:
        description: "Max docs per run (default: 200)"
        required: false
        default: "200"
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.10"
  # Force unbuffered output to see logs immediately
  PYTHONUNBUFFERED: "1"
  # Disable telemetry for faster startup
  OTEL_SDK_DISABLED: "true"
  ANONYMIZED_TELEMETRY: "false"
  CHROMA_TELEMETRY: "false"
  # HuggingFace cache directory
  HF_HOME: ${{ github.workspace }}/.cache/huggingface

jobs:
  sync-vector-db:
    # Only run if previous workflow succeeded (or manual trigger)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub-hosted runner hard limit is 6 hours per job

    steps:
      # =====================================================================
      # Free Disk Space (Required for ML dependencies ~15GB freed)
      # =====================================================================

      - name: Free Disk Space
        run: |
          echo "📊 Disk space before cleanup:"
          df -h /

          # Remove unnecessary large packages (saves ~15GB)
          sudo rm -rf /usr/share/dotnet              # ~6GB
          sudo rm -rf /usr/local/lib/android         # ~6GB
          sudo rm -rf /opt/ghc                       # ~2GB
          sudo rm -rf /opt/hostedtoolcache/CodeQL    # ~1GB
          sudo rm -rf /usr/share/swift               # ~1GB
          sudo rm -rf /usr/local/share/powershell    # ~500MB
          sudo rm -rf /usr/local/.ghcup              # ~500MB

          # Clean apt cache
          sudo apt-get clean

          echo "📊 Disk space after cleanup:"
          df -h /

      # =====================================================================
      # Setup
      # =====================================================================

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          # Fetch all history for proper git operations
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # =====================================================================
      # Caching (Critical for Performance)
      # =====================================================================

      - name: Cache pip packages
        uses: actions/cache@v5
        id: cache-pip
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-vectordb-${{ hashFiles('requirements_github_action_vectordb.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-vectordb-

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        id: cache-hf
        with:
          path: ${{ env.HF_HOME }}
          key: ${{ runner.os }}-hf-bge-m3-v1
          restore-keys: |
            ${{ runner.os }}-hf-bge-m3-

      # =====================================================================
      # Install Dependencies
      # =====================================================================

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # Install PyTorch CPU-only FIRST (before other packages that depend on it)
          # This avoids downloading the 3GB+ CUDA version
          echo "📦 Installing PyTorch (CPU-only)..."
          pip install torch --index-url https://download.pytorch.org/whl/cpu

          # Install remaining dependencies
          echo "📦 Installing other dependencies..."
          pip install -r requirements_github_action_vectordb.txt

          echo "✅ Dependencies installed"

      # =====================================================================
      # Check for Data Changes
      # =====================================================================

      - name: Check if JSON files changed
        id: check-changes
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            EVENTS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'data_collection/webscraping/events.json' | wc -l)
            PLACES_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'data_collection/webscraping/places.json' | wc -l)
          else
            EVENTS_CHANGED=1
            PLACES_CHANGED=1
          fi

          PENDING_STATE_COUNT=0
          if [ -d "data/vector_db/_sync_state" ]; then
            PENDING_STATE_COUNT=$(find data/vector_db/_sync_state -maxdepth 1 -name '*.json' | wc -l)
          fi
          PENDING_STATE_EXISTS=false
          if [ "$PENDING_STATE_COUNT" -gt 0 ]; then
            PENDING_STATE_EXISTS=true
          fi

          echo "events_changed=$EVENTS_CHANGED" >> $GITHUB_OUTPUT
          echo "places_changed=$PLACES_CHANGED" >> $GITHUB_OUTPUT
          echo "pending_state_count=$PENDING_STATE_COUNT" >> $GITHUB_OUTPUT
          echo "pending_state_exists=$PENDING_STATE_EXISTS" >> $GITHUB_OUTPUT

          if [ "$EVENTS_CHANGED" -gt 0 ] || [ "$PLACES_CHANGED" -gt 0 ] || [ "$PENDING_STATE_EXISTS" = "true" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "📝 Data changes or pending sync state detected"
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No data changes detected"
          fi

      # =====================================================================
      # Sync Vector Store (Incremental Batching)
      # =====================================================================

      - name: Sync Vector Database
        if: steps.check-changes.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 330 # Keep headroom for install, stats, and final repository operations
        run: |
          echo "============================================================"
          echo "🔄 Starting Vector Store Sync"
          echo "============================================================"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          commit_progress() {
            local commit_msg="$1"
            git add data/vector_db/

            if git diff --staged --quiet; then
              echo "ℹ️ No vector DB changes to commit for this iteration"
              return 0
            fi

            git commit -m "$commit_msg"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
            echo "✅ Progress committed: $commit_msg"
          }

          # Configure max docs per iteration (default: 200)
          MAX_DOCS="${{ github.event.inputs.max_docs }}"
          if [ -z "$MAX_DOCS" ]; then
            MAX_DOCS=200
          fi

          # Build base sync command
          SYNC_CMD="python tools/vector_store.py --no-gpu --max-docs $MAX_DOCS"

          if [ "${{ github.event.inputs.rebuild_events }}" == "true" ]; then
            SYNC_CMD="$SYNC_CMD --rebuild-events"
            echo "⚠️ Force rebuilding events collection"
          fi

          if [ "${{ github.event.inputs.rebuild_places }}" == "true" ]; then
            SYNC_CMD="$SYNC_CMD --rebuild-places"
            echo "⚠️ Force rebuilding places collection"
          fi

          echo "Command: $SYNC_CMD"
          echo ""

          # Incremental sync loop
          # Exit codes: 0 = complete, 2 = more work pending, other = error
          # Total capacity: 10 iterations × 200 docs = 2000 docs max per workflow run
          MAX_ITERATIONS=10
          TOTAL_PROCESSED=0

          for i in $(seq 1 $MAX_ITERATIONS); do
            echo "────────────────────────────────────────────────────────────"
            echo "📦 Batch $i/$MAX_ITERATIONS (max $MAX_DOCS docs per batch)"
            echo "────────────────────────────────────────────────────────────"
            
            # Run sync and capture exit code
            set +e  # Don't exit on non-zero
            $SYNC_CMD
            EXIT_CODE=$?
            set -e

            COMMIT_MSG="Vector DB Sync: $(date +'%Y-%m-%d %H:%M') [batch-$i]"
            if [ "${{ steps.check-changes.outputs.events_changed }}" -gt 0 ]; then
              COMMIT_MSG="$COMMIT_MSG [events]"
            fi
            if [ "${{ steps.check-changes.outputs.places_changed }}" -gt 0 ]; then
              COMMIT_MSG="$COMMIT_MSG [places]"
            fi
            if [ "${{ steps.check-changes.outputs.pending_state_exists }}" = "true" ]; then
              COMMIT_MSG="$COMMIT_MSG [resume]"
            fi

            echo ""
            echo "Exit code: $EXIT_CODE"
            
            # Handle different exit codes (including SIGTERM = 143)
            if [ $EXIT_CODE -eq 0 ]; then
              commit_progress "$COMMIT_MSG"
              echo "✅ Sync complete (all documents processed)"
              break
            elif [ $EXIT_CODE -eq 2 ]; then
              commit_progress "$COMMIT_MSG"
              echo "⏳ More work pending, continuing..."
              TOTAL_PROCESSED=$((TOTAL_PROCESSED + MAX_DOCS))
            elif [ $EXIT_CODE -eq 143 ]; then
              commit_progress "$COMMIT_MSG"
              # SIGTERM received (runner timeout/memory pressure)
              echo "⚠️ SIGTERM received (exit code 143) - runner terminated process"
              echo "   Work completed so far has been saved"
              echo "   Re-run workflow to continue processing"
              exit 0  # Exit gracefully so commit step runs
            else
              echo "❌ Sync failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
            
            # Warn if max iterations reached with work pending
            if [ $i -eq $MAX_ITERATIONS ] && [ $EXIT_CODE -eq 2 ]; then
              echo ""
              echo "⚠️ WARNING: Reached max iterations ($MAX_ITERATIONS)"
              echo "   Processed approximately: $TOTAL_PROCESSED documents"
              echo "   More documents remain pending"
              echo "   → Re-run this workflow to continue processing"
              echo "   → Or increase max_docs parameter for larger batches"
            fi
          done

          echo ""
          echo "============================================================"
          echo "✅ Vector Store Sync Completed"
          echo "============================================================"

      - name: Show Vector DB Stats
        if: steps.check-changes.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python tools/vector_store.py --stats --no-gpu

      # =====================================================================
      # Commit Changes
      # =====================================================================

      - name: Commit Vector Database Changes
        if: steps.check-changes.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add vector database files
          git add data/vector_db/

          # Check for changes before committing
          if git diff --staged --quiet; then
            echo "ℹ️ No vector DB changes to commit"
          else
            COMMIT_MSG="Vector DB Sync: $(date +'%Y-%m-%d %H:%M')"
            
            # Add details about what was synced
            if [ "${{ steps.check-changes.outputs.events_changed }}" -gt 0 ]; then
              COMMIT_MSG="$COMMIT_MSG [events]"
            fi
            if [ "${{ steps.check-changes.outputs.places_changed }}" -gt 0 ]; then
              COMMIT_MSG="$COMMIT_MSG [places]"
            fi
            
            git commit -m "$COMMIT_MSG"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
            echo "✅ Vector database committed and pushed"
          fi

      # =====================================================================
      # Skip notification
      # =====================================================================

      - name: Skip Notification
        if: steps.check-changes.outputs.changes_detected == 'false' && github.event_name != 'workflow_dispatch'
        run: |
          echo "ℹ️ Skipped: No JSON data changes detected"
          echo "Vector database is already up-to-date and there is no pending sync state"
